moveit_twist_controller:
  free_angle:
    type: string
    default_value: ""
    description: "Axis where the actual rotation is free. Empty string means no free angle."
    read_only: true
    validation:
      one_of<>: [["","x","y","z"]]

  chained_controller:
    type: string
    default_value: ""
    description: "Name of the chained controller to prepend to command interfaces. If set, command interfaces will be <chained_controller>/<joint>/<interface>, otherwise <joint>/<interface>."
    read_only: true

  group_name:
    type: string
    default_value: "arm_group"
    description: "Name of the group in the moveit configuration."
    read_only: true
    validation:
      not_empty<>: [ ]

  velocity_limits:
      type: double_array
      default_value: []
      description: "Velocity limits in rad/s for the joints in the group. If not set, the default velocity limits from the srdf are used."
      read_only: true
      validation:
        lower_element_bounds<>: [0.0]

  robot_descriptions_loading_timeout:
      type: double
      default_value: 5.0
      description: "Timeout for loading the robot description and robot_description_semantic in seconds."
      read_only: false
      validation:
        gt<>: 0.0

  velocity_limit_satisfaction_max_iterations:
      type: int
      default_value: 3
      description: "Maximum number of iterations of the velocity limit satisfaction algorithm."
      read_only: false
      validation:
        gt<>: 0

  velocity_limit_satisfaction_multiplicator:
      type: double
      default_value: 0.5
      description: "Multiplicator for the velocity limit satisfaction algorithm. (0,1)"
      read_only: false
      validation:
        bounds<>: [ 0.0, 1.0 ]

  joint_velocity_smoothing_factor:
      type: double
      default_value: 0.0
      description: "Exponential smoothing factor for joint velocities. 0.0 means no smoothing (raw IK output), values close to 1.0 produce very smooth but sluggish motion."
      read_only: false
      validation:
        bounds<>: [ 0.0, 1.0 ]

  cmd_timeout:
      type: double
      default_value: 0.25
      description: "Timeout in seconds after which twist commands are zeroed if no new message arrives."
      read_only: false
      validation:
        gt<>: 0.0

